name: Build index

# Rebuild index.json whenever catalogue content changes, and commit it back. The
# paths filter excludes index.json itself (plus [skip ci]) so the commit can't
# re-trigger this. Linux-only, short timeout, cancel superseded runs.
on:
  push:
    branches: [main]
    paths:
      - "methods/**"
      - "routines/**"
      - "scripts/build-index.mjs"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-index
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node scripts/build-index.mjs
      - name: Commit index.json
        run: |
          git config user.name "vanta-lib-bot"
          git config user.email "vanta-lib-bot@users.noreply.github.com"
          git add index.json
          if git diff --cached --quiet; then
            echo "index.json unchanged"
          else
            git commit -m "chore: rebuild index.json [skip ci]"
            git push
          fi
